#http-json
server:
  port: 18444

system:
  mining-type: 2 # 1CPU 2GPU
  miner-address-list:
    - '4qYT7uiNECBYLozRLPugyFkGhbWLxwC4QonbfCBCjjXb'
  net-params: 'MainNetParams'
  #数据存储路径 按照网络前缀分类
  path: "/bitcoin/devdb"
  #数据库缓存大小 单位MB 基于LRU策略实现的一级缓存
  db-cache-size: 500
  #节点与节点之间的通信 TCP通信 支持P2P网络
  quic-port: 8334
  is-stun: false
  stun-port: 3479
  stun-address:
    - '127.0.0.1:3479'
  web-socket: 28334
  #用户在启动时可以配置公钥 对于隐私接口必须签名才能访问 也就是节点所有者
  server-pubkey:
    - '101.35.87.31:3479'
  # - '/ip4/101.35.87.31/quic/8333/p2p/CCQ24R48twy4erGc8bkmDD2XtXeR3u33uPWRpBuAPcdA'
  bootstrap:
    - '/ip4/101.35.87.31/quic/8333/p2p/CCQ24R48twy4erGc8bkmDD2XtXeR3u33uPWRpBuAPcdA'




logging:
  level:
