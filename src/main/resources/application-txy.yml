#http-json
server:
  port: 18666

system:
  mining-type: 1 # 1CPU 2GPU
  miner-address-list:
    - 'AYRNAzJs9qNpL2PRSKoteh2Mg1SQSmqoHzY1Siyd5Qcz'
  net-params: 'MainNetParams'
  #数据存储路径 按照网络前缀分类
  path: "/bitcoin/txydb"
  #数据库缓存大小 单位MB 基于LRU策略实现的一级缓存
  db-cache-size: 500
  #节点与节点之间的通信 TCP通信 支持P2P网络
