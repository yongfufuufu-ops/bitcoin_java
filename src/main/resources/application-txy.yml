  stun-port: 3479
  stun-address:
    - '127.0.0.1:3479'
  web-socket: 28333
  #用户在启动时可以配置公钥 对于隐私接口必须签名才能访问 也就是节点所有者
  server-pubkey:
    - ''
  bootstrap:
    - '/ip4/127.0.0.1/quic/8334/p2p/7BBnkRzL4ubKXRJgetRnknCMS7GV1LspLQmBSmrmeia7'
    - '/ip4/127.0.0.1/quic/8333/p2p/ttfyrD2jVDxxJYCfqyH1XgkMc1k5gxgUCxo1MPSp3UN'



